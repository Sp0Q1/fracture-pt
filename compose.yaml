services:
  zitadel-db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zitadel
    volumes:
      - zitadel_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zitadel"]
      interval: 5s
      timeout: 3s
      retries: 5

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest-debug
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_LOGINPOLICY_ALLOWREGISTER: "true"
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: mailcrab:1025
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_SMTP_USER: ""
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_TLS: "false"
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_FROM: noreply@gethacked.eu
      ZITADEL_FIRSTINSTANCE_SMTPCONFIGURATION_FROMNAME: GetHacked
      # Login V2 is a separate Next.js container we don't run in dev.
      # Disable it so Zitadel falls back to Login V1 (built-in).
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
    extra_hosts:
      - "host.containers.internal:host-gateway"
    depends_on:
      zitadel-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "/app/zitadel ready"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  mailcrab:
    image: docker.io/marlonb/mailcrab:latest
    ports:
      - "127.0.0.1:1080:1080"
      - "127.0.0.1:1025:1025"

  app:
    build:
      context: .
      dockerfile: Containerfile.dev
    network_mode: host
    depends_on:
      zitadel:
        condition: service_healthy
      mailcrab:
        condition: service_started
    volumes:
      - ./config:/app/config:ro
      - ./assets:/app/assets:ro
    env_file:
      - .env
    environment:
      - OIDC_ISSUER_URL=http://localhost:8080
      - OIDC_REDIRECT_URI=http://localhost:5150/api/auth/oidc/callback
      - MAILER_HOST=localhost
      - SERVER_BINDING=0.0.0.0
    entrypoint: ["/entrypoint.sh"]

volumes:
  zitadel_data:
