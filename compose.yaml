services:
  # Identity provider. Mirrors the framework's dev IdP: a single Keycloak with
  # realms imported declaratively from dev/keycloak/import on boot —
  #   - tenant-acme : a tenant realm (self-registration on, the fracture-pt client)
  #   - staff       : the cross-tenant staff realm, brokered into the tenant realm
  # so the dev login flow matches production's realm-per-tenant topology. The
  # realm config is framework-provided; only the app client is pt's own.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./dev/keycloak/import:/opt/keycloak/data/import:ro
    ports:
      - "127.0.0.1:8080:8080"

  mailcrab:
    image: docker.io/marlonb/mailcrab:latest
    ports:
      - "127.0.0.1:1080:1080"
      - "127.0.0.1:1025:1025"

  # The gethacked.eu portal — pt's own application on top of the framework IdP.
  app:
    build:
      context: .
      dockerfile: Containerfile.dev
    network_mode: host
    depends_on:
      keycloak:
        condition: service_started
      mailcrab:
        condition: service_started
    volumes:
      - app_data:/app/data
      - ./config:/app/config:ro
      - ./assets:/app/assets:ro
    env_file:
      - .env
    environment:
      # This deployment points at one tenant realm (matches production's
      # one-deployment-per-tenant model documented in fracture-cms/FEDERATION).
      - OIDC_ISSUER_URL=http://localhost:8080/realms/tenant-acme
      - OIDC_REDIRECT_URI=http://localhost:5150/api/auth/oidc/callback
      - OIDC_POST_LOGOUT_REDIRECT_URI=http://localhost:5150
      - MAILER_HOST=localhost
      - MAILER_ENABLED=true
      # Bind to loopback only; with network_mode: host this listener is on the
      # host directly, so 0.0.0.0 would expose the dev app on every interface.
      - SERVER_BINDING=${SERVER_BINDING:-127.0.0.1}
    entrypoint: ["/entrypoint.sh"]

volumes:
  app_data:
