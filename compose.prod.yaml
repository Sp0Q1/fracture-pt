# GetHacked.eu — Production compose
#
# Quick start (SQLite, no IdP):
#   fracture-ctl init --prod > .env.prod && chmod 600 .env.prod
#   podman compose -f compose.prod.yaml build app
#   podman compose -f compose.prod.yaml up -d app
#
# With PostgreSQL:
#   Add to .env.prod:  APP_DB_PASSWORD=<random>  DATABASE_URL=postgres://...
#   podman compose -f compose.prod.yaml up -d
#
# Add OIDC + SMTP to .env.prod when ready, then restart app.

services:
  db:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${APP_DB_USER:-gethacked}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB: ${APP_DB_NAME:-gethacked}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-gethacked}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ${APP_IMAGE:-ghcr.io/sp0q1/fracture-pt:latest}
    build:
      context: .
      dockerfile: Containerfile.prod
    restart: unless-stopped
    userns_mode: keep-id
    ports:
      - "127.0.0.1:${APP_PORT:-5150}:5150"
    volumes:
      - app_data:/app/data
    env_file:
      - .env.prod
    environment:
      LOCO_ENV: production
      SERVER_BINDING: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:-sqlite:///app/data/gethacked.sqlite?mode=rwc}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROJECT_ID: ${OIDC_PROJECT_ID:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-}
      MAILER_HOST: ${MAILER_HOST:-}
      MAILER_PORT: ${MAILER_PORT:-587}
      MAILER_USER: ${MAILER_USER:-}
      MAILER_PASSWORD: ${MAILER_PASSWORD:-}

volumes:
  db_data:
  app_data:
