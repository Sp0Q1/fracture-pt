# Loco configuration file — gethacked development

logger:
  enable: true
  pretty_backtrace: true
  level: debug
  format: compact

server:
  port: 5150
  binding: {{ get_env(name="SERVER_BINDING", default="localhost") }}
  host: http://localhost
  middlewares:
    static:
      enable: true
      must_exist: true
      precompressed: false
      folder:
        uri: "/static"
        path: "assets/static"
      fallback: "assets/static/404.html"

workers:
  mode: BackgroundAsync

mailer:
  smtp:
    enable: true
    host: {{ get_env(name="MAILER_HOST", default="localhost") }}
    port: 1025
    secure: false

settings:
  contact_email: {{ get_env(name="CONTACT_EMAIL", default="hello@gethacked.eu") }}
  oidc:
    provider_name: zitadel
    issuer_url: {{ get_env(name="OIDC_ISSUER_URL", default="http://localhost:8080") }}
    client_id: "{{ get_env(name='OIDC_CLIENT_ID') }}"
    client_secret: {{ get_env(name="OIDC_CLIENT_SECRET") }}
    project_id: "{{ get_env(name='OIDC_PROJECT_ID', default='') }}"
    redirect_uri: {{ get_env(name="OIDC_REDIRECT_URI", default="http://localhost:5150/api/auth/oidc/callback") }}
    post_logout_redirect_uri: {{ get_env(name="OIDC_POST_LOGOUT_REDIRECT_URI", default="http://localhost:5150") }}
    scopes:
      - openid
      - email
      - profile

database:
  uri: {{ get_env(name="DATABASE_URL", default="sqlite://gethacked_development.sqlite?mode=rwc") }}
  enable_logging: false
  connect_timeout: {{ get_env(name="DB_CONNECT_TIMEOUT", default="500") }}
  idle_timeout: {{ get_env(name="DB_IDLE_TIMEOUT", default="500") }}
  min_connections: {{ get_env(name="DB_MIN_CONNECTIONS", default="1") }}
  max_connections: {{ get_env(name="DB_MAX_CONNECTIONS", default="1") }}
  auto_migrate: true
  dangerously_truncate: false
  dangerously_recreate: false

auth:
  jwt:
    secret: {{ get_env(name="JWT_SECRET") }}
    expiration: 900
    location:
      - from: Bearer
      - from: Cookie
        name: jwt
