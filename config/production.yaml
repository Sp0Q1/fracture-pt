# Loco configuration file — gethacked production

logger:
  enable: true
  pretty_backtrace: false
  level: info
  format: json

server:
  port: {{ get_env(name="PORT", default="5150") }}
  binding: 0.0.0.0
  host: {{ get_env(name="APP_URL", default="https://gethacked.eu") }}
  middlewares:
    static:
      enable: true
      must_exist: true
      precompressed: false
      folder:
        uri: "/static"
        path: "assets/static"
      fallback: "assets/static/404.html"

workers:
  mode: BackgroundAsync

mailer:
  smtp:
    enable: {{ get_env(name="MAILER_ENABLED", default="false") }}
    host: {{ get_env(name="MAILER_HOST", default="localhost") }}
    port: {{ get_env(name="MAILER_PORT", default="587") }}
    secure: true
    auth:
      user: {{ get_env(name="MAILER_USER", default="") }}
      password: {{ get_env(name="MAILER_PASSWORD", default="") }}

settings:
  contact_email: {{ get_env(name="CONTACT_EMAIL", default="hello@gethacked.eu") }}
  oidc:
    provider_name: {{ get_env(name="OIDC_PROVIDER_NAME", default="zitadel") }}
    issuer_url: {{ get_env(name="OIDC_ISSUER_URL", default="") }}
    client_id: "{{ get_env(name='OIDC_CLIENT_ID', default='') }}"
    client_secret: {{ get_env(name="OIDC_CLIENT_SECRET", default="") }}
    project_id: "{{ get_env(name='OIDC_PROJECT_ID', default='') }}"
    redirect_uri: {{ get_env(name="OIDC_REDIRECT_URI", default="") }}
    post_logout_redirect_uri: {{ get_env(name="OIDC_POST_LOGOUT_REDIRECT_URI", default="") }}
    scopes:
      - openid
      - email
      - profile

database:
  uri: {{ get_env(name="DATABASE_URL", default="sqlite:///app/data/gethacked.sqlite?mode=rwc") }}
  enable_logging: false
  connect_timeout: {{ get_env(name="DB_CONNECT_TIMEOUT", default="5000") }}
  idle_timeout: {{ get_env(name="DB_IDLE_TIMEOUT", default="30000") }}
  min_connections: {{ get_env(name="DB_MIN_CONNECTIONS", default="2") }}
  max_connections: {{ get_env(name="DB_MAX_CONNECTIONS", default="10") }}
  auto_migrate: true
  dangerously_truncate: false
  dangerously_recreate: false

auth:
  jwt:
    secret: {{ get_env(name="JWT_SECRET") }}
    expiration: 900
    location:
      - from: Bearer
      - from: Cookie
        name: jwt
