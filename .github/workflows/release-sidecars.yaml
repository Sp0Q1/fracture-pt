name: Release sidecar images

# Builds and publishes the per-tool podman sidecar images that
# `services::tool_runner` invokes with `--pull=never`.
#
# Trigger model:
# - `v*` tag push → build + push every sidecar so a release always has
#   matching images on the registry.
# - push to `main` that touched `containers/tools/**` → build + push
#   immediately so updates land between releases too.
# - workflow_dispatch → on-demand rebuild (e.g. after a manual rev bump).
#
# The image tag is the *upstream* tool version (e.g. `v2.6.6` for
# subfinder) — the IMAGE consts in `src/services/*.rs` reference these
# fixed tags, so re-pushing the same tag is a no-op when the
# Containerfile hasn't changed.

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "containers/tools/**"
      - ".github/workflows/release-sidecars.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Subdomain enumeration. Image is built from
          # containers/tools/subfinder/Containerfile, which FROMs
          # docker.io/projectdiscovery/subfinder:v2.6.6 and bakes
          # placeholder OSINT config files at the path subfinder
          # expects under $HOME/.config/subfinder/.
          - name: subfinder
            context: containers/tools/subfinder
            tag: v2.6.6
          # TCP port scan. Image is built from
          # containers/tools/nmap/Containerfile, FROM
          # docker.io/instrumentisto/nmap:7.97 with USER 65534.
          - name: nmap
            context: containers/tools/nmap
            tag: "7.97"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }} sidecar
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Containerfile
          push: true
          tags: ghcr.io/sp0q1/fracture-pt-${{ matrix.name }}:${{ matrix.tag }}
          # Cache from a moving "buildcache" tag so successive runs
          # don't re-pull the upstream layers from scratch.
          cache-from: type=registry,ref=ghcr.io/sp0q1/fracture-pt-${{ matrix.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/sp0q1/fracture-pt-${{ matrix.name }}:buildcache,mode=max
