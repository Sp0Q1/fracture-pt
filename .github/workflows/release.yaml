name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/rust.yml

  release:
    needs: ci
    uses: Sp0Q1/fracture-cms/.github/workflows/release-app.yaml@46952ce2ef632e2689003c61a94b7355110f0295 # cms main
    with:
      image_name: ghcr.io/${{ github.repository }}
    # No `secrets: inherit` — the reusable workflow only needs GITHUB_TOKEN,
    # which is provided automatically; inheriting would expose every repo secret.
