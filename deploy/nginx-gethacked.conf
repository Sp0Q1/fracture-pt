# GetHacked.eu — nginx reverse proxy configuration
#
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/.
# Obtain TLS certificates with: certbot --nginx -d gethacked.eu -d auth.gethacked.eu
#
# This config assumes:
#   - App listens on 127.0.0.1:5150
#   - Zitadel listens on 127.0.0.1:8081
#   - Certbot manages TLS certificates via Let's Encrypt

# --- Redirect HTTP to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name gethacked.eu auth.gethacked.eu;
    return 301 https://$host$request_uri;
}

# --- GetHacked application ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gethacked.eu;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/gethacked.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gethacked.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (app sets CSP itself — don't duplicate)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # HSTS — uncomment after verifying TLS works correctly
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://127.0.0.1:5150;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # Static assets — cache aggressively (SRI hashes ensure integrity)
    location /static/ {
        proxy_pass http://127.0.0.1:5150/static/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block common scanners
    location ~ /\. { deny all; }
    location ~ /(wp-admin|wp-login|xmlrpc|phpmyadmin) { return 444; }
}

# --- Zitadel (OIDC identity provider) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.gethacked.eu;

    # TLS — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/gethacked.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gethacked.eu/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS — uncomment after verifying TLS works correctly
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Zitadel uses gRPC-web internally — needs larger buffers
    client_max_body_size 10m;
    grpc_read_timeout 300s;
    grpc_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # gRPC support for Zitadel API
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location ~ /\. { deny all; }
}
